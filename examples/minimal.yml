name: Claudius Review
on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.label.name == 'claudius-review'
    runs-on: ubuntu-latest
    steps:
      - uses: lklimek/claudius-review-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
