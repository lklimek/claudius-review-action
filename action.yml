---
name: "Claudius PR Review"
description: "Claudius AI-powered PR code review using Claude Code"
branding:
  icon: eye
  color: purple

inputs:
  anthropic_api_key:
    description: "Anthropic API key (alternative to OAuth)"
    required: false
    default: ""
  claude_code_oauth_token:
    description: "Claude Code OAuth token (alternative to API key)"
    required: false
    default: ""
  memcan_url:
    description: "MemCan server URL (e.g., http://host:8190)"
    required: false
    default: ""
  memcan_api_key:
    description: "MemCan API key for server authentication"
    required: false
    default: ""
  github_token:
    description: "GitHub token for API/CLI"
    required: false
    default: ${{ github.token }}
  claude_agent:
    description: "Claude agent persona"
    required: false
    default: "claudius:claudius"
  plugins:
    description: "Newline-separated plugin list"
    required: false
    default: |
      claudius@lklimek
      claudash@lklimek
      memcan@lklimek
  plugin_marketplaces:
    description: "Newline-separated marketplace URLs"
    required: false
    default: |
      https://github.com/lklimek/agents.git
  prompt_extra:
    description: "Additional instructions appended to core prompt"
    required: false
    default: ""
  trigger_label:
    description: "Label to remove on success"
    required: false
    default: "claudius-review"
  remove_label_on_success:
    description: "Whether to remove trigger label"
    required: false
    default: "true"
  checkout:
    description: "Whether action handles git checkout"
    required: false
    default: "true"
  fetch_depth:
    description: "Git fetch depth (only if checkout=true)"
    required: false
    default: "0"
  allowed_tools:
    description: "Tool allowlist for Claude"
    required: false
    default: "mcp__plugin_claudius_github,mcp__plugin_claudius_github__pull_request_read,mcp__plugin_claudius_github__pull_request_review_write,mcp__plugin_claudius_github__add_reply_to_pull_request_comment,Read,Write,Edit,Glob,Grep,Agent,Skill,Task,TaskCreate,TaskUpdate,TaskList,TaskGet,TaskOutput,SendMessage,Bash(gh pr *),Bash(gh api *),Bash(git diff *),Bash(git log *),Bash(git fetch *),Bash(git branch *),Bash(git rev-parse *),Bash(git show *),Bash(git pull *),Bash(git checkout *),Bash(git status),Bash(git status *),Bash(git remote *),Bash(git merge-base *),Bash(echo *),Bash(ls *),Bash(jq *),Bash(mkdir *),Bash(mktemp *),Bash(pwd *),Bash(*gh-resolve-review-threads.sh *),Bash(*gh-fetch-review-comments.sh *),Bash(*gh-fetch-reviews.sh *),Bash(*gh-list-review-threads.sh *),Bash(*gh-request-reviewer.sh *),Bash(*gh-post-review.sh *),Bash(*gh-pr-base-sha.sh *),Bash(*consolidate_reports.py *),Bash(*validate_report.py *),Bash(*generate_review_report.py *),mcp__plugin_memcan_brain,mcp__plugin_memcan_brain__search,mcp__plugin_memcan_brain__search_memories,mcp__plugin_memcan_brain__add_memory,mcp__plugin_memcan_brain__update_memory,mcp__plugin_memcan_brain__delete_memory,mcp__plugin_memcan_brain__count_memories"
  claude_extra_args:
    description: "Additional Claude Code CLI flags (appended to built-in args)"
    required: false
    default: ""
  report_retention_days:
    description: "Artifact retention days"
    required: false
    default: "14"

outputs:
  report_artifact_name:
    description: "Name of the uploaded review report artifact"
    value: claude-review-report-pr-${{ github.event.pull_request.number }}

runs:
  using: composite
  steps:
    - name: Validate authentication
      shell: bash
      run: |
        if [ -z "${{ inputs.anthropic_api_key }}" ] && [ -z "${{ inputs.claude_code_oauth_token }}" ]; then
          echo "::error::Either 'anthropic_api_key' or 'claude_code_oauth_token' must be provided."
          exit 1
        fi

    - name: Pre-flight checks
      shell: bash
      run: |
        if [ -n "${{ inputs.memcan_url }}" ] && [ -n "${{ inputs.memcan_api_key }}" ]; then
          {
            echo 'MEMCAN_PROMPT<<MEMCAN_EOF'
            echo 'MemCan persistent memory is available. Use memcan:recall at session start to load project context.'
            echo 'Use memcan:lessons-learned only if the review found MEDIUM or higher severity findings worth remembering.'
            echo 'When spawning agents, pass MemCan context from recall results in their prompts.'
            echo 'MEMCAN_EOF'
          } >> "$GITHUB_ENV"
        else
          echo "::warning::MemCan URL or API key not provided. MemCan features will be unavailable."
          {
            echo 'MEMCAN_PROMPT<<MEMCAN_EOF'
            echo 'MemCan is NOT available — skip memcan:recall, memcan:lessons-learned, and all mcp__plugin_memcan_brain__* tools.'
            echo 'When spawning agents, instruct them to not use memcan tools.'
            echo 'MEMCAN_EOF'
          } >> "$GITHUB_ENV"
        fi
        echo "::group::Claude Code environment"
        echo "ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-<not set>}"
        echo "CLAUDE_CODE_MAX_TURNS=${CLAUDE_CODE_MAX_TURNS:-<not set>}"
        echo "CLAUDE_CODE_EFFORT_LEVEL=${CLAUDE_CODE_EFFORT_LEVEL:-<not set>}"
        echo "CLAUDE_CODE_SUBAGENT_MODEL=${CLAUDE_CODE_SUBAGENT_MODEL:-<not set>}"
        echo "CLAUDE_CODE_AUTO_COMPACT=${CLAUDE_CODE_AUTO_COMPACT:-<not set>}"
        echo "CLAUDE_CODE_COMPACT_THRESHOLD=${CLAUDE_CODE_COMPACT_THRESHOLD:-<not set>}"
        echo "CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING=${CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING:-<not set>}"
        echo "CLAUDE_CODE_DISABLE_1M_CONTEXT=${CLAUDE_CODE_DISABLE_1M_CONTEXT:-<not set>}"
        echo "::endgroup::"

    - name: Checkout
      if: inputs.checkout == 'true'
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.fetch_depth }}

    - name: Configure git HTTPS
      shell: bash
      run: git config --global url."https://github.com/".insteadOf "git@github.com:"

    - name: Create report directory
      shell: bash
      run: |
        mkdir -p "${{ github.workspace }}/review-report"
        echo "REPORT_DIR=${{ github.workspace }}/review-report" >> "$GITHUB_ENV"

    - name: Override MemCan MCP config
      if: inputs.memcan_url != '' && inputs.memcan_api_key != ''
      shell: bash
      run: |
        MCP_FILE="${{ github.workspace }}/.mcp.json"
        BRAIN_CONFIG='{"mcpServers":{"brain":{"type":"http","url":"${MEMCAN_URL}/mcp","headers":{"Authorization":"Bearer ${MEMCAN_API_KEY}"}}}}'
        if [ -f "$MCP_FILE" ]; then
          jq -s '.[0] * .[1]' "$MCP_FILE" <(echo "$BRAIN_CONFIG") > "${MCP_FILE}.tmp" && mv "${MCP_FILE}.tmp" "$MCP_FILE"
        else
          echo "$BRAIN_CONFIG" | jq . > "$MCP_FILE"
        fi

    - name: Run Claude Code Review
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        use_sticky_comment: true
        show_full_output: true
        trigger_phrase: ""
        plugin_marketplaces: ${{ inputs.plugin_marketplaces }}
        plugins: ${{ inputs.plugins }}
        prompt: |
          You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.
          Base branch: ${{ github.event.pull_request.base.ref }}
          Head branch: ${{ github.event.pull_request.head.ref }}
          PR title: ${{ github.event.pull_request.title }}

          ${{ env.MEMCAN_PROMPT }}

          Use MCP tools (mcp__plugin_claudius_github__*) for GitHub operations. If an MCP call fails, fall back to gh CLI.

          Sub-agents have no conversation history —
          pass all relevant PR context explicitly when spawning them.

          Do NOT create temporary directories (mktemp). Use REPORT_DIR env var for report output.

          Write all PR comments in Claudius persona — witty, confident, subtly snarky,
          but always respectful and genuinely helpful, as if advising a trusted colleague.

          If MemCan is available, invoke Skill(skill="memcan:recall") to load project context.

          Follow this review flow in order. Steps 1 and 2 MUST use the Skill tool —
          do NOT skip them or perform their work manually.

          1. Invoke Skill(skill="claudius:check-pr-comments") to check previous review comments.
             For each thread that IS fixed but NOT yet resolved, reply describing the fix
             and resolve the thread.
          2. Invoke Skill(skill="claudius:grumpy-review") to perform a fresh code review.
             This spawns parallel specialist agents and produces a consolidated report.
             Do NOT review the code yourself — the skill handles the full pipeline.
             Generate HTML format instead of markdown (use --format html in the render step).
             REPORT_DIR is pre-set to ${{ github.workspace }}/review-report — write report.json and report.html there. Do NOT create temp directories for reports.
          3. Post only MEDIUM severity and higher findings as new inline PR comments.
          4. If no unresolved comments remain after the full flow, approve the PR.

          ${{ inputs.prompt_extra }}
        claude_args: >-
          --agent ${{ inputs.claude_agent }}
          --allowedTools "${{ inputs.allowed_tools }}"
          ${{ inputs.claude_extra_args }}
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        MEMCAN_URL: ${{ inputs.memcan_url }}
        MEMCAN_API_KEY: ${{ inputs.memcan_api_key }}

    - name: Upload review report
      id: upload-report
      if: '!cancelled()'
      uses: actions/upload-artifact@v4
      with:
        name: claude-review-report-pr-${{ github.event.pull_request.number }}
        path: |
          ${{ github.workspace }}/review-report/report.json
          ${{ github.workspace }}/review-report/report.html
        retention-days: ${{ inputs.report_retention_days }}
        if-no-files-found: ignore

    - name: Append report link to last Claude review
      if: steps.upload-report.outputs.artifact-url != ''
      shell: bash
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        ARTIFACT_URL="${{ steps.upload-report.outputs.artifact-url }}"
        REPORT_LINE="📊 **[View full HTML review report](${ARTIFACT_URL})**"
        # Find the last review by claude[bot]
        REVIEW_ID=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
          --jq '[.[] | select(.user.login == "claude[bot]")] | last | .id // empty')
        if [ -n "$REVIEW_ID" ]; then
          BODY=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}" --jq '.body')
          # Remove any previous report link to avoid duplicates
          CLEAN_BODY=$(echo "$BODY" | sed '/^📊 \*\*\[View full HTML review report\]/d')
          UPDATED="${CLEAN_BODY}
        ${REPORT_LINE}"
          gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews/${REVIEW_ID}" \
            -X PUT -f body="$UPDATED"
        else
          # Fallback: post as a regular comment if no Claude review found
          gh pr comment "$PR_NUMBER" --body "$REPORT_LINE"
        fi
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: Remove trigger label
      if: inputs.remove_label_on_success == 'true' && success()
      shell: bash
      run: |
        gh pr edit "${{ github.event.pull_request.number }}" \
          --remove-label "${{ inputs.trigger_label }}" 2>/dev/null || true
      env:
        GH_TOKEN: ${{ inputs.github_token }}
